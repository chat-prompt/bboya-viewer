<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css');
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 630px;
    background: linear-gradient(150deg, #F8FAFB 0%, #F0F5FA 30%, #E8F0F8 70%, #E1EBF5 100%);
    font-family: 'Pretendard Variable', 'Pretendard', -apple-system, sans-serif;
    display: flex;
    align-items: center;
    padding: 48px 56px;
    gap: 44px;
    position: relative;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: absolute;
    top: -120px;
    right: -80px;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(91,141,190,0.07) 0%, transparent 70%);
    pointer-events: none;
  }

  .left {
    flex: 0 0 380px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .badge {
    display: inline-flex;
    background: rgba(91,141,190,0.12);
    color: #5B8DBE;
    font-size: 14px;
    font-weight: 700;
    padding: 5px 14px;
    border-radius: 18px;
    margin-bottom: 16px;
    width: fit-content;
  }

  .title {
    font-size: 40px;
    font-weight: 800;
    color: #1A2332;
    line-height: 1.25;
    letter-spacing: -0.5px;
    margin-bottom: 14px;
  }

  .subtitle {
    font-size: 17px;
    color: #4A5568;
    line-height: 1.6;
  }

  .right { flex: 1; }

  .terminal-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    background: #1A2332;
    border-radius: 10px 10px 0 0;
    padding: 11px 16px;
  }
  .dot { width: 9px; height: 9px; border-radius: 50%; }
  .dot.r { background: #FF5F57; }
  .dot.y { background: #FFBD2E; }
  .dot.g { background: #28CA42; }
  .terminal-text {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 14px;
    color: #7AABDB;
    margin-left: 6px;
  }
  .terminal-text .prompt { color: #6EE7B7; }

  .grid {
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 14px;
    background: rgba(255,255,255,0.5);
    border: 1px solid #D4DCE2;
    border-top: none;
    border-radius: 0 0 14px 14px;
  }

  .row { display: grid; gap: 8px; }
  .row-2 { grid-template-columns: 1fr 1fr; }
  .row-3 { grid-template-columns: 1fr 1fr 1fr; }

  .card {
    background: rgba(255,255,255,0.85);
    border: 1px solid #D4DCE2;
    border-radius: 10px;
    padding: 14px 12px;
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .card-icon {
    font-size: 24px;
    width: 38px;
    height: 38px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 10px;
    flex-shrink: 0;
  }
  .card:nth-child(1) .card-icon { background: rgba(91,141,190,0.1); }
  .card:nth-child(2) .card-icon { background: rgba(59,130,246,0.08); }
  .row-3 .card:nth-child(1) .card-icon { background: rgba(245,158,11,0.08); }
  .row-3 .card:nth-child(2) .card-icon { background: rgba(16,185,129,0.08); }
  .row-3 .card:nth-child(3) .card-icon { background: rgba(139,92,246,0.08); }

  .card-name {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 15px;
    font-weight: 700;
    color: #1A2332;
  }
  .card-label {
    font-size: 13px;
    font-weight: 600;
  }
  .row-2 .card:nth-child(1) .card-label { color: #5B8DBE; }
  .row-2 .card:nth-child(2) .card-label { color: #3B82F6; }
  .row-3 .card:nth-child(1) .card-label { color: #D97706; }
  .row-3 .card:nth-child(2) .card-label { color: #059669; }
  .row-3 .card:nth-child(3) .card-label { color: #7C3AED; }

  .row-3 .card { padding: 10px 10px; }
  .row-3 .card-icon { width: 32px; height: 32px; font-size: 20px; }
  .row-3 .card-name { font-size: 13px; }
  .row-3 .card-label { font-size: 12px; }
</style>
</head>
<body>
<div class="left">
  <div class="badge">📖 사내 AI 에이전트 적용 핸드북 #1</div>
  <div class="title">🏠 봇이 사는 집</div>
  <div class="subtitle">워크스페이스와 핵심 파일 5개.<br>이 집을 어떻게 꾸미느냐에 따라<br>봇이 달라진다.</div>
</div>
<div class="right">
  <div class="terminal-bar">
    <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
    <span class="terminal-text"><span class="prompt">$</span> ls ~/.openclaw/workspace-뽀야/</span>
  </div>
  <div class="grid">
    <div class="row row-2">
      <div class="card">
        <div class="card-icon">👻</div>
        <div><div class="card-name">SOUL.md</div><div class="card-label">영혼</div></div>
      </div>
      <div class="card">
        <div class="card-icon">👤</div>
        <div><div class="card-name">USER.md</div><div class="card-label">집사 프로필</div></div>
      </div>
    </div>
    <div class="row row-3">
      <div class="card">
        <div class="card-icon">📋</div>
        <div><div class="card-name">AGENTS.md</div><div class="card-label">사규</div></div>
      </div>
      <div class="card">
        <div class="card-icon">🧠</div>
        <div><div class="card-name">MEMORY.md</div><div class="card-label">화이트보드</div></div>
      </div>
      <div class="card">
        <div class="card-icon">🪪</div>
        <div><div class="card-name">IDENTITY.md</div><div class="card-label">명함</div></div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
