<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css');
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 630px;
    background: linear-gradient(150deg, #F8FAFB 0%, #F0F5FA 30%, #E8F0F8 70%, #E1EBF5 100%);
    font-family: 'Pretendard Variable', 'Pretendard', -apple-system, sans-serif;
    display: flex;
    align-items: center;
    padding: 48px 56px;
    gap: 44px;
    position: relative;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: absolute;
    top: -120px;
    right: -80px;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(91,141,190,0.07) 0%, transparent 70%);
    pointer-events: none;
  }

  .left {
    flex: 0 0 400px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .badge {
    display: inline-flex;
    background: rgba(232,133,108,0.12);
    color: #E8856C;
    font-size: 14px;
    font-weight: 700;
    padding: 5px 14px;
    border-radius: 18px;
    margin-bottom: 16px;
    width: fit-content;
  }

  .title {
    font-size: 40px;
    font-weight: 800;
    color: #1A2332;
    line-height: 1.25;
    letter-spacing: -0.5px;
    margin-bottom: 14px;
  }

  .subtitle {
    font-size: 17px;
    color: #4A5568;
    line-height: 1.6;
  }

  .right {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .armor-card {
    background: rgba(255,255,255,0.85);
    border: 1px solid #D4DCE2;
    border-radius: 12px;
    padding: 20px 20px;
    display: flex;
    gap: 14px;
    align-items: flex-start;
  }

  .armor-icon {
    font-size: 32px;
    width: 48px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 12px;
    flex-shrink: 0;
  }

  .armor-card:nth-child(1) .armor-icon { background: rgba(239,68,68,0.08); }
  .armor-card:nth-child(2) .armor-icon { background: rgba(245,158,11,0.08); }
  .armor-card:nth-child(3) .armor-icon { background: rgba(91,141,190,0.08); }

  .armor-name {
    font-size: 20px;
    font-weight: 700;
    color: #1A2332;
    margin-bottom: 3px;
  }

  .armor-card:nth-child(1) .armor-name { color: #DC2626; }
  .armor-card:nth-child(2) .armor-name { color: #D97706; }
  .armor-card:nth-child(3) .armor-name { color: #5B8DBE; }

  .armor-desc {
    font-size: 15px;
    color: #6B7A8F;
    line-height: 1.5;
  }

  .armor-sub {
    font-size: 13px;
    color: #9BA8B8;
    margin-top: 2px;
  }
</style>
</head>
<body>
<div class="left">
  <div class="badge">📖 사내 AI 에이전트 적용 핸드북 #2</div>
  <div class="title">🛡️ 갑옷 입히기</div>
  <div class="subtitle">봇을 팀 채널에 데려가기 전,<br>반드시 해야 할 3가지.</div>
</div>
<div class="right">
  <div class="armor-card">
    <div class="armor-icon">🔒</div>
    <div>
      <div class="armor-name">보안</div>
      <div class="armor-desc">누가 시킬 수 있는가</div>
      <div class="armor-sub">소프트 보안 (AGENTS.md) + 하드 보안 (openclaw.json)</div>
    </div>
  </div>
  <div class="armor-card">
    <div class="armor-icon">📢</div>
    <div>
      <div class="armor-name">호명규칙</div>
      <div class="armor-desc">언제 반응할 것인가</div>
      <div class="armor-sub">기술 레이어 + 호명 레이어 + 행동 레이어</div>
    </div>
  </div>
  <div class="armor-card">
    <div class="armor-icon">🗣️</div>
    <div>
      <div class="armor-name">대화질서</div>
      <div class="armor-desc">어떻게 대화할 것인가</div>
      <div class="armor-sub">스레드 규칙 + 봇 간 대화 2턴 제한 + 채널 설정</div>
    </div>
  </div>
</div>
</body>
</html>
