<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css');
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 630px;
    background: linear-gradient(150deg, #F8FAFB 0%, #F0F5FA 30%, #E8F0F8 70%, #E1EBF5 100%);
    font-family: 'Pretendard Variable', 'Pretendard', -apple-system, sans-serif;
    display: flex;
    align-items: center;
    padding: 48px 56px;
    gap: 44px;
    position: relative;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: absolute;
    bottom: -120px;
    left: -80px;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(155,107,155,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  .left {
    flex: 0 0 400px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .badge {
    display: inline-flex;
    background: rgba(155,107,155,0.12);
    color: #9B6B9B;
    font-size: 14px;
    font-weight: 700;
    padding: 5px 14px;
    border-radius: 18px;
    margin-bottom: 16px;
    width: fit-content;
  }

  .title {
    font-size: 40px;
    font-weight: 800;
    color: #1A2332;
    line-height: 1.25;
    letter-spacing: -0.5px;
    margin-bottom: 14px;
  }

  .subtitle {
    font-size: 17px;
    color: #4A5568;
    line-height: 1.6;
  }

  .right {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .flow {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
  }

  .flow-step {
    flex: 1;
    background: rgba(255,255,255,0.85);
    border: 1px solid #D4DCE2;
    border-radius: 12px;
    padding: 20px 16px;
    text-align: center;
  }

  .flow-icon { font-size: 36px; margin-bottom: 8px; }

  .flow-name {
    font-size: 17px;
    font-weight: 700;
    color: #1A2332;
    margin-bottom: 3px;
  }

  .flow-desc {
    font-size: 13px;
    color: #6B7A8F;
    line-height: 1.4;
  }

  .flow-arrow {
    font-size: 22px;
    color: #D4DCE2;
    flex-shrink: 0;
  }

  .mcp-row {
    display: flex;
    gap: 8px;
    width: 100%;
  }

  .mcp-badge {
    flex: 1;
    background: rgba(91,141,190,0.06);
    border: 1px solid rgba(91,141,190,0.15);
    border-radius: 8px;
    padding: 10px;
    text-align: center;
    font-size: 13px;
    color: #5B8DBE;
    font-weight: 600;
  }

  .mcp-badge .emoji { font-size: 18px; margin-right: 4px; }
</style>
</head>
<body>
<div class="left">
  <div class="badge">📖 사내 AI 에이전트 적용 핸드북 #3</div>
  <div class="title">✨ 봇에게 영혼 주기</div>
  <div class="subtitle">SOUL.md로 성격을 만들고,<br>USER.md로 주인을 알게 하고,<br>MCP로 눈과 손을 달아준다.</div>
</div>
<div class="right">
  <div class="flow">
    <div class="flow-step">
      <div class="flow-icon">👻</div>
      <div class="flow-name">SOUL.md</div>
      <div class="flow-desc">대화로 성격 만들기</div>
    </div>
    <div class="flow-arrow">→</div>
    <div class="flow-step">
      <div class="flow-icon">👤</div>
      <div class="flow-name">USER.md</div>
      <div class="flow-desc">주인 맞춤형 대화</div>
    </div>
    <div class="flow-arrow">→</div>
    <div class="flow-step">
      <div class="flow-icon">🔌</div>
      <div class="flow-name">MCP</div>
      <div class="flow-desc">외부 도구 연결</div>
    </div>
  </div>
  <div class="mcp-row">
    <div class="mcp-badge"><span class="emoji">📊</span>Linear</div>
    <div class="mcp-badge"><span class="emoji">📅</span>Calendar</div>
    <div class="mcp-badge"><span class="emoji">📧</span>Gmail</div>
    <div class="mcp-badge"><span class="emoji">💬</span>Slack</div>
  </div>
</div>
</body>
</html>
