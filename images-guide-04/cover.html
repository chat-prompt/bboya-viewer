<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css');
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 630px;
    background: linear-gradient(150deg, #F8FAFB 0%, #F0F5FA 30%, #E8F0F8 70%, #E1EBF5 100%);
    font-family: 'Pretendard Variable', 'Pretendard', -apple-system, sans-serif;
    display: flex;
    align-items: center;
    padding: 48px 56px;
    gap: 44px;
    position: relative;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: absolute;
    top: -120px;
    right: -80px;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(91,141,190,0.07) 0%, transparent 70%);
    pointer-events: none;
  }

  .left {
    flex: 0 0 380px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .badge {
    display: inline-flex;
    background: rgba(107,155,123,0.12);
    color: #6B9B7B;
    font-size: 14px;
    font-weight: 700;
    padding: 5px 14px;
    border-radius: 18px;
    margin-bottom: 16px;
    width: fit-content;
  }

  .title {
    font-size: 40px;
    font-weight: 800;
    color: #1A2332;
    line-height: 1.25;
    letter-spacing: -0.5px;
    margin-bottom: 14px;
  }

  .subtitle {
    font-size: 17px;
    color: #4A5568;
    line-height: 1.6;
  }

  .right {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .topic-card {
    background: rgba(255,255,255,0.85);
    border: 1px solid #D4DCE2;
    border-radius: 12px;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 6px;
  }

  .topic-icon { font-size: 32px; }

  .topic-name {
    font-size: 18px;
    font-weight: 700;
    color: #1A2332;
  }

  .topic-desc {
    font-size: 13px;
    color: #6B7A8F;
    line-height: 1.4;
  }
</style>
</head>
<body>
<div class="left">
  <div class="badge">📖 사내 AI 에이전트 적용 핸드북 #4</div>
  <div class="title">🤝 함께 일하기</div>
  <div class="subtitle">멀티에이전트, 스킬, 메모리, 자동화까지 — 봇을 진짜 팀원으로 만드는 법.</div>
</div>
<div class="right">
  <div class="topic-card">
    <div class="topic-icon">🐱🐱</div>
    <div class="topic-name">멀티에이전트</div>
    <div class="topic-desc">역할별 봇 분리<br>sessions_send 소통</div>
  </div>
  <div class="topic-card">
    <div class="topic-icon">⚡</div>
    <div class="topic-name">스킬</div>
    <div class="topic-desc">봇에게 새 능력 가르치기<br>SKILL.md 매뉴얼</div>
  </div>
  <div class="topic-card">
    <div class="topic-icon">🧠</div>
    <div class="topic-name">메모리</div>
    <div class="topic-desc">3단 기억 구조<br>파일에 써야 기억함</div>
  </div>
  <div class="topic-card">
    <div class="topic-icon">⏰</div>
    <div class="topic-name">자동화</div>
    <div class="topic-desc">크론잡 + 하트비트<br>자는 동안에도 일함</div>
  </div>
</div>
</body>
</html>
