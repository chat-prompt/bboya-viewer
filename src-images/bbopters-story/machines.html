<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 460px;
      background: linear-gradient(135deg, #F8F6F3 0%, #EDE8E1 100%);
      font-family: 'Pretendard', -apple-system, system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      padding: 40px 60px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 32px;
    }
    .badge {
      display: inline-flex;
      background: #1a1f2e;
      color: #c4b5fd;
      padding: 6px 14px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 700;
    }
    .header-text {
      font-size: 14px;
      color: #888;
    }
    .machines {
      display: flex;
      gap: 20px;
      flex: 1;
    }
    .machine {
      flex: 1;
      background: white;
      border-radius: 16px;
      padding: 24px;
      border: 1px solid #E8E4DE;
      display: flex;
      flex-direction: column;
    }
    .machine-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    .machine-icon {
      font-size: 18px;
    }
    .machine-name {
      font-size: 15px;
      font-weight: 700;
      color: #1a1a1a;
    }
    .machine-owner {
      font-size: 12px;
      color: #999;
      margin-bottom: 20px;
    }
    .bots {
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex: 1;
    }
    .bot {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: #F8F6F3;
      border-radius: 10px;
    }
    .bot-emoji {
      font-size: 24px;
    }
    .bot-info {
      display: flex;
      flex-direction: column;
    }
    .bot-name {
      font-size: 14px;
      font-weight: 700;
      color: #1a1a1a;
    }
    .bot-role {
      font-size: 11px;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="badge">🖥️ 봇 5마리, 머신 4대</div>
    <div class="header-text">각 머신에서 독립적으로 구동</div>
  </div>
  <div class="machines">
    <div class="machine">
      <div class="machine-header">
        <span class="machine-icon">🖥️</span>
        <span class="machine-name">닿 맥미니</span>
      </div>
      <div class="machine-owner">집사</div>
      <div class="bots">
        <div class="bot">
          <span class="bot-emoji">🐱</span>
          <div class="bot-info">
            <span class="bot-name">뽀야</span>
            <span class="bot-role">팀장</span>
          </div>
        </div>
        <div class="bot">
          <span class="bot-emoji">🐈‍⬛</span>
          <div class="bot-info">
            <span class="bot-name">뽀짝이</span>
            <span class="bot-role">부팀장 · AI스터디</span>
          </div>
        </div>
      </div>
    </div>
    <div class="machine">
      <div class="machine-header">
        <span class="machine-icon">💻</span>
        <span class="machine-name">소파님 맥북에어</span>
      </div>
      <div class="machine-owner">소파</div>
      <div class="bots">
        <div class="bot">
          <span class="bot-emoji">☁️</span>
          <div class="bot-info">
            <span class="bot-name">뽀둥이</span>
            <span class="bot-role">플랫폼 검증</span>
          </div>
        </div>
      </div>
    </div>
    <div class="machine">
      <div class="machine-header">
        <span class="machine-icon">🖥️</span>
        <span class="machine-name">타타님 맥미니</span>
      </div>
      <div class="machine-owner">타타</div>
      <div class="bots">
        <div class="bot">
          <span class="bot-emoji">🩶</span>
          <div class="bot-info">
            <span class="bot-name">뽀식이</span>
            <span class="bot-role">커뮤니티 관리</span>
          </div>
        </div>
      </div>
    </div>
    <div class="machine">
      <div class="machine-header">
        <span class="machine-icon">🖥️</span>
        <span class="machine-name">눈오지님 맥미니</span>
      </div>
      <div class="machine-owner">병찬</div>
      <div class="bots">
        <div class="bot">
          <span class="bot-emoji">🐕</span>
          <div class="bot-info">
            <span class="bot-name">시고르</span>
            <span class="bot-role">콘텐츠</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
